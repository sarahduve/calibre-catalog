<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Library</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e0e0e0;
    --accent: #2563eb;
    --tag-bg: #e8e8e8;
    --format-bg: #dbeafe;
    --format-text: #1e40af;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --card-bg: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #999;
      --border: #333;
      --accent: #60a5fa;
      --tag-bg: #333;
      --format-bg: #1e3a5f;
      --format-text: #93c5fd;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  header { margin-bottom: 16px; }
  header h1 { font-size: 1.4rem; margin-bottom: 12px; }
  .controls { display: flex; flex-direction: column; gap: 8px; }
  .search-input, .filter-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px; /* prevents iOS zoom */
    background: var(--card-bg);
    color: var(--text);
  }
  .filter-row { display: flex; gap: 8px; }
  .filter-row select { flex: 1; }
  .count { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; }
  .card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.3; }
  .card-author { font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; }
  .card-series {
    font-size: 0.8rem;
    color: var(--accent);
    margin-top: 4px;
    font-style: italic;
  }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-format { background: var(--format-bg); color: var(--format-text); }
  .badge-tag { background: var(--tag-bg); color: var(--text-muted); }
</style>
</head>
<body>
<header>
  <h1>My Library</h1>
  <div class="controls">
    <input class="search-input" type="search" placeholder="Search title or author..." id="search">
    <div class="filter-row">
      <select class="filter-select" id="format-filter">
        <option value="">All formats</option>
      </select>
      <select class="filter-select" id="tag-filter">
        <option value="">All tags</option>
      </select>
    </div>
  </div>
  <div class="count" id="count"></div>
</header>
<div class="card-list" id="cards"></div>

<script>
const BOOKS = __BOOKS_DATA__;

const searchEl = document.getElementById("search");
const formatEl = document.getElementById("format-filter");
const tagEl = document.getElementById("tag-filter");
const cardsEl = document.getElementById("cards");
const countEl = document.getElementById("count");

// Populate filter dropdowns
const allFormats = [...new Set(BOOKS.flatMap(b => b.formats))].sort();
const allTags = [...new Set(BOOKS.flatMap(b => b.tags))].sort();
allFormats.forEach(f => formatEl.add(new Option(f, f)));
allTags.forEach(t => tagEl.add(new Option(t, t)));

function render() {
  const query = searchEl.value.toLowerCase();
  const fmt = formatEl.value;
  const tag = tagEl.value;

  const filtered = BOOKS.filter(b => {
    if (query && !b.title.toLowerCase().includes(query) && !b.authors.toLowerCase().includes(query)) return false;
    if (fmt && !b.formats.includes(fmt)) return false;
    if (tag && !b.tags.includes(tag)) return false;
    return true;
  });

  countEl.textContent = `${filtered.length} of ${BOOKS.length} books`;

  cardsEl.innerHTML = filtered.map(b => `
    <div class="card">
      <div class="card-title">${esc(b.title)}</div>
      <div class="card-author">${esc(b.authors)}</div>
      ${b.series ? `<div class="card-series">${esc(b.series)}${b.series_index ? ` #${b.series_index}` : ""}</div>` : ""}
      <div class="card-meta">
        ${b.formats.map(f => `<span class="badge badge-format">${esc(f)}</span>`).join("")}
        ${b.tags.map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join("")}
      </div>
    </div>
  `).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

searchEl.addEventListener("input", render);
formatEl.addEventListener("change", render);
tagEl.addEventListener("change", render);
render();
</script>
</body>
</html>
